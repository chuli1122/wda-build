name: Build WebDriverAgent IPA

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest  # GitHub 提供的 Mac runner，自带最新 Xcode
    steps:
      - name: Checkout appium/WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build WDA (unsigned)
        run: |
          mkdir -p build
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Package as IPA
        run: |
          cd build/Build/Products/Debug-iphoneos

          # 删 dSYM (sideloadly 不接受)
          find WebDriverAgentRunner-Runner.app -name "*.dSYM" -exec rm -rf {} +

          # ad-hoc 签整个 app + 内嵌 framework + plugin (sideloadly 需要至少 ad-hoc 签名作为锚点)
          codesign --force --sign - --deep --timestamp=none WebDriverAgentRunner-Runner.app

          # 验证签名
          codesign -dv WebDriverAgentRunner-Runner.app 2>&1 || true

          mkdir -p Payload
          cp -r WebDriverAgentRunner-Runner.app Payload/
          zip -ry WebDriverAgentRunner.ipa Payload/
          ls -la WebDriverAgentRunner.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: webdriveragent-ipa
          path: build/Build/Products/Debug-iphoneos/WebDriverAgentRunner.ipa
          retention-days: 30
