name: Build WebDriverAgent IPA

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest  # GitHub 提供的 Mac runner，自带最新 Xcode
    steps:
      - name: Checkout appium/WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build WDA (unsigned)
        run: |
          mkdir -p build
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Package as IPA
        run: |
          cd build/Build/Products/Debug-iphoneos

          # 删 dSYM (sideloadly 不接受)
          find WebDriverAgentRunner-Runner.app -name "*.dSYM" -exec rm -rf {} +

          APP="WebDriverAgentRunner-Runner.app"

          # codesign --deep 不会进 PlugIns/*.xctest 里去签, 必须手动从内向外:
          # 1. .xctest 内嵌的 framework
          codesign --force --sign - --timestamp=none \
            "$APP/PlugIns/WebDriverAgentRunner.xctest/Frameworks/WebDriverAgentLib.framework"

          # 2. .xctest bundle 自己
          codesign --force --sign - --timestamp=none \
            "$APP/PlugIns/WebDriverAgentRunner.xctest"

          # 3. .app 主体 + 外层 Frameworks (--deep 对外层 Frameworks 是 OK 的)
          codesign --force --sign - --deep --timestamp=none "$APP"

          # 验证签名
          echo "=== .app signature ==="
          codesign -dv "$APP" 2>&1 || true
          echo "=== .xctest signature ==="
          codesign -dv "$APP/PlugIns/WebDriverAgentRunner.xctest" 2>&1 || true
          echo "=== WebDriverAgentLib.framework signature ==="
          codesign -dv "$APP/PlugIns/WebDriverAgentRunner.xctest/Frameworks/WebDriverAgentLib.framework" 2>&1 || true

          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -ry WebDriverAgentRunner.ipa Payload/
          ls -la WebDriverAgentRunner.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: webdriveragent-ipa
          path: build/Build/Products/Debug-iphoneos/WebDriverAgentRunner.ipa
          retention-days: 30
